# 应用主配置
app:
  name: "OS Agent"
  version: "1.0.0"
  language: "zh-CN"
  log_level: "INFO"

# 代理配置
agent:
  max_conversation_turns: 50
  max_command_length: 1000
  command_timeout: 30

# 连接器配置
connector:
  mode: "local"  # local 或 remote
  remote:
    host: ""
    port: 22
    username: ""
    key_path: ""

# 界面配置
interface:
  cli:
    enabled: true
  web:
    enabled: true
    host: "0.0.0.0"
    port: 8000
